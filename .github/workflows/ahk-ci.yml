name: AHK Syntax Check & Build
# CI skips dumps/ and logs/ via sparse-checkout

on:
  push:
    paths:
      - '**.ahk'
      - '**.ahk.txt'
      - 'tools/ci_lint.py'
      - '.github/workflows/ahk-ci.yml'
  pull_request:
    paths:
      - '**.ahk'
      - '**.ahk.txt'
      - 'tools/ci_lint.py'
      - '.github/workflows/ahk-ci.yml'

jobs:
  lint:
    name: Lint & Congruence Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            tools
            .github
          sparse-checkout-cone-mode: true

      # Channel rules: PRs are judged against their target branch, pushes
      # against the pushed branch. Only master/stable trigger channel-label
      # enforcement inside the linter; other branches get the generic checks.
      # BRANCH goes through env (never inline in run:) — branch names are
      # attacker-controlled on fork PRs and would otherwise be shell-injected.
      - name: Run lint / congruence checks
        env:
          BRANCH: ${{ github.base_ref || github.ref_name }}
        run: |
          echo "Channel rules for branch: $BRANCH"
          python3 tools/ci_lint.py --repo . --channel-branch "$BRANCH"

  syntax-check:
    name: Syntax Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            NursingAddon
            tests
            tools
            .github
          sparse-checkout-cone-mode: true

      - name: Init Yunit submodule
        shell: pwsh
        run: git submodule update --init tools/Yunit

      # Download portable AHK v1 from GitHub releases (autohotkey.com is behind Cloudflare)
      - name: Install AutoHotkey v1
        shell: pwsh
        run: |
          $ahkDir = "C:\ahk-v1"
          New-Item -ItemType Directory -Path $ahkDir -Force | Out-Null
          $zipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "$env:TEMP\ahk-v1.zip"
          Expand-Archive -Path "$env:TEMP\ahk-v1.zip" -DestinationPath $ahkDir -Force
          # Find the exe (could be AutoHotkeyU64.exe or AutoHotkey.exe depending on zip layout)
          $exe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkey*.exe" -Recurse | Select-Object -First 1
          Write-Host "AHK v1 found at: $($exe.FullName)"
          echo "AHK1_EXE=$($exe.FullName)" >> $env:GITHUB_ENV

      # Download portable AHK v2 from GitHub releases
      - name: Install AutoHotkey v2
        shell: pwsh
        run: |
          $ahkDir = "C:\ahk-v2"
          New-Item -ItemType Directory -Path $ahkDir -Force | Out-Null
          $zipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "$env:TEMP\ahk-v2.zip"
          Expand-Archive -Path "$env:TEMP\ahk-v2.zip" -DestinationPath $ahkDir -Force
          $exe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkey*.exe" -Recurse |
            Where-Object { $_.Name -match "64" -or $_.Name -eq "AutoHotkey.exe" } |
            Select-Object -First 1
          if ($exe) {
            Write-Host "AHK v2 found at: $($exe.FullName)"
            echo "AHK2_EXE=$($exe.FullName)" >> $env:GITHUB_ENV
          } else {
            Write-Host "::warning::AHK v2 exe not found in zip"
          }

      # Syntax check v1 scripts (*.ahk and legacy *.ahk.txt; v2 files are skipped)
      - name: Syntax check AHK v1 scripts
        shell: pwsh
        run: |
          $ahk1 = $env:AHK1_EXE
          if (-not $ahk1 -or -not (Test-Path $ahk1)) {
            Write-Host "::error::AHK v1 exe not found at: $ahk1"
            exit 1
          }
          $failed = @()
          # Lint v1 scripts: both *.ahk and legacy *.ahk.txt (the .txt suffix is
          # left over from an older flow). Skip third-party/library trees and any
          # file that declares AutoHotkey v2 (those are handled by the v2 job).
          $scripts = Get-ChildItem -Path . -Recurse -Include *.ahk, *.ahk.txt | Where-Object {
            if ($_.FullName -match "\\archive\\|\\test\\|\\dumps\\|\\tools\\") { return $false }
            # Skip v2 scripts (handled by the v2 job). Scan the whole file: the
            # #Requires directive is not always in the first few lines.
            if (Select-String -Path $_.FullName -Pattern '#Requires\s+AutoHotkey\s+v2' -Quiet) { return $false }
            return $true
          }

          if ($scripts.Count -eq 0) {
            Write-Host "No v1 .ahk/.ahk.txt files found, skipping v1 syntax check"
            exit 0
          }

          foreach ($script in $scripts) {
            Write-Host "Checking: $($script.FullName)"

            # AHK only parses files with a .ahk extension. Copy .ahk.txt to a temp
            # .ahk next to it; use real .ahk files directly so an original is never
            # deleted.
            if ($script.Extension -eq ".txt") {
              $target = $script.FullName -replace '\.txt$', ''
              Copy-Item $script.FullName $target -Force
              $isTemp = $true
            } else {
              $target = $script.FullName
              $isTemp = $false
            }

            $proc = Start-Process -FilePath $ahk1 `
              -ArgumentList "/ErrorStdOut", "/iLib", "NUL", $target `
              -Wait -PassThru -NoNewWindow `
              -RedirectStandardError "$env:TEMP\ahk_stderr.txt" `
              -RedirectStandardOutput "$env:TEMP\ahk_stdout.txt"

            $stderr = ""
            if (Test-Path "$env:TEMP\ahk_stderr.txt") {
              $stderr = Get-Content "$env:TEMP\ahk_stderr.txt" -Raw
            }
            $stdout = ""
            if (Test-Path "$env:TEMP\ahk_stdout.txt") {
              $stdout = Get-Content "$env:TEMP\ahk_stdout.txt" -Raw
            }

            if ($isTemp) { Remove-Item $target -ErrorAction SilentlyContinue }

            if ($proc.ExitCode -ne 0 -or $stderr -match "Error") {
              $errMsg = if ($stderr) { $stderr } else { $stdout }
              Write-Host "::error file=$($script.Name)::Syntax error in $($script.Name): $errMsg"
              $failed += $script.Name
            } else {
              Write-Host "  PASS"
            }
          }

          if ($failed.Count -gt 0) {
            Write-Host ""
            Write-Host "::error::FAILED syntax check for: $($failed -join ', ')"
            exit 1
          }

          Write-Host ""
          Write-Host "All v1 scripts passed syntax check"

      # Syntax check v2 scripts (.ahk files with #Requires v2)
      - name: Syntax check AHK v2 scripts
        shell: pwsh
        run: |
          $ahk2 = $env:AHK2_EXE
          if (-not $ahk2 -or -not (Test-Path $ahk2)) {
            Write-Host "::warning::AHK v2 not available, skipping v2 syntax check"
            exit 0
          }

          $failed = @()
          $scripts = Get-ChildItem -Path . -Filter "*.ahk" -Recurse |
            Where-Object { $_.FullName -notmatch "\\tools\\" -and $_.FullName -notmatch "\\tests\\" }

          if ($scripts.Count -eq 0) {
            Write-Host "No standalone .ahk files found, skipping v2 syntax check"
            exit 0
          }

          foreach ($script in $scripts) {
            # Scan the whole file: the #Requires directive is not always in
            # the first few lines (NursingAddon scripts declare it late).
            $isV2 = Select-String -Path $script.FullName -Pattern '#Requires\s+AutoHotkey\s+v2' -Quiet

            if (-not $isV2) {
              Write-Host "Skipping $($script.Name) (not a v2 script)"
              continue
            }

            Write-Host "Checking: $($script.FullName)"

            # /validate is the v2 load-without-running switch (/iLib is v1-only)
            $proc = Start-Process -FilePath $ahk2 `
              -ArgumentList "/ErrorStdOut=utf-8", "/validate", $script.FullName `
              -Wait -PassThru -NoNewWindow `
              -RedirectStandardError "$env:TEMP\ahk_stderr.txt" `
              -RedirectStandardOutput "$env:TEMP\ahk_stdout.txt"

            $stderr = ""
            if (Test-Path "$env:TEMP\ahk_stderr.txt") {
              $stderr = Get-Content "$env:TEMP\ahk_stderr.txt" -Raw
            }
            $stdout = ""
            if (Test-Path "$env:TEMP\ahk_stdout.txt") {
              $stdout = Get-Content "$env:TEMP\ahk_stdout.txt" -Raw
            }

            if ($proc.ExitCode -ne 0 -or $stderr -match "Error") {
              $errMsg = if ($stderr) { $stderr } else { $stdout }
              Write-Host "::error file=$($script.Name)::Syntax error in $($script.Name): $errMsg"
              $failed += $script.Name
            } else {
              Write-Host "  PASS"
            }
          }

          if ($failed.Count -gt 0) {
            Write-Host ""
            Write-Host "::error::FAILED syntax check for: $($failed -join ', ')"
            exit 1
          }

          Write-Host ""
          Write-Host "All v2 scripts passed syntax check"

  unit-tests:
    name: Unit Tests (Yunit)
    runs-on: windows-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            NursingAddon
            tests
            tools
            .github
          sparse-checkout-cone-mode: true

      - name: Init Yunit submodule
        shell: pwsh
        run: git submodule update --init tools/Yunit

      - name: Install AutoHotkey v1
        shell: pwsh
        run: |
          $ahkDir = "C:\ahk-v1"
          New-Item -ItemType Directory -Path $ahkDir -Force | Out-Null
          $zipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "$env:TEMP\ahk-v1.zip"
          Expand-Archive -Path "$env:TEMP\ahk-v1.zip" -DestinationPath $ahkDir -Force
          $exe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkey*.exe" -Recurse | Select-Object -First 1
          echo "AHK1_EXE=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: Run Yunit tests
        shell: pwsh
        run: |
          $ahk1 = $env:AHK1_EXE
          $testFiles = Get-ChildItem -Path tests -Filter "test_*.ahk.txt" -Recurse
          $failed = @()

          if ($testFiles.Count -eq 0) {
            Write-Host "No test files found in tests/, skipping"
            exit 0
          }

          foreach ($test in $testFiles) {
            Write-Host "Running: $($test.Name)"

            $tempAhk = "$($test.FullName -replace '\.txt$', '')"
            Copy-Item $test.FullName $tempAhk

            $proc = Start-Process -FilePath $ahk1 `
              -ArgumentList "/ErrorStdOut", $tempAhk `
              -Wait -PassThru -NoNewWindow `
              -RedirectStandardError "$env:TEMP\test_stderr.txt" `
              -RedirectStandardOutput "$env:TEMP\test_stdout.txt"

            $stderr = ""
            if (Test-Path "$env:TEMP\test_stderr.txt") {
              $stderr = Get-Content "$env:TEMP\test_stderr.txt" -Raw
            }
            $stdout = ""
            if (Test-Path "$env:TEMP\test_stdout.txt") {
              $stdout = Get-Content "$env:TEMP\test_stdout.txt" -Raw
            }

            Remove-Item $tempAhk -ErrorAction SilentlyContinue

            if ($stdout) { Write-Host $stdout }

            if ($proc.ExitCode -ne 0 -or $stderr -match "Error|FAIL") {
              $errMsg = if ($stderr) { $stderr } else { "Exit code: $($proc.ExitCode)" }
              Write-Host "::error file=$($test.Name)::Test failure in $($test.Name): $errMsg"
              $failed += $test.Name
            } else {
              Write-Host "  PASS"
            }
          }

          if ($failed.Count -gt 0) {
            Write-Host ""
            Write-Host "::error::FAILED tests: $($failed -join ', ')"
            exit 1
          }

          Write-Host ""
          Write-Host "All unit tests passed"

  gui-e2e:
    name: GUI Smoke & E2E
    runs-on: windows-latest   # x64 image: interactive desktop (windows-11-arm is headless - never move this job there)
    needs: syntax-check
    timeout-minutes: 20       # /ErrorStdOut prevents modal-dialog hangs, this is the backstop
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            tests
            tools
            .github
          sparse-checkout-cone-mode: true

      - name: Install AutoHotkey v1 (U64)
        shell: pwsh
        run: |
          $ahkDir = "C:\ahk-v1"
          New-Item -ItemType Directory -Path $ahkDir -Force | Out-Null
          $zipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "$env:TEMP\ahk-v1.zip"
          Expand-Archive -Path "$env:TEMP\ahk-v1.zip" -DestinationPath $ahkDir -Force
          # The e2e stubs use 64-bit WNDCLASSEXW offsets - pin the U64 build.
          $exe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkeyU64.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Host "::error::AutoHotkeyU64.exe not found"; exit 1 }
          echo "AHK1_EXE=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: Prepare scripts and stub executables
        shell: pwsh
        run: |
          foreach ($f in Get-ChildItem tests -Filter "*.ahk.txt") {
            Copy-Item $f.FullName ($f.FullName -replace '\.txt$', '') -Force
          }
          # Renamed copies so the module's ahk_exe detection sees the real
          # process names (CPFlowsheets.exe / CPRSChart.exe).
          Copy-Item $env:AHK1_EXE "$env:TEMP\CPFlowsheets.exe"
          Copy-Item $env:AHK1_EXE "$env:TEMP\CPRSChart.exe"

      # NOTE: AutoHotkey is a GUI-subsystem exe — PowerShell's call operator (&)
      # does NOT wait for it and $LASTEXITCODE would be stale (steps would pass
      # vacuously). Start-Process -Wait -PassThru is required.
      - name: GUI smoke test (panel focus, F-key hide, drop-up follow)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath $env:AHK1_EXE -ArgumentList "/ErrorStdOut", "$PWD\tests\smoke_gui.ahk" `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput "$env:TEMP\smoke_out.txt" -RedirectStandardError "$env:TEMP\smoke_err.txt"
          Get-Content "$env:TEMP\smoke_out.txt" -ErrorAction SilentlyContinue
          Get-Content "$env:TEMP\smoke_err.txt" -ErrorAction SilentlyContinue
          exit $p.ExitCode

      - name: CPFS e2e (stub Add Data form)
        shell: pwsh
        run: |
          Start-Process "$env:TEMP\CPFlowsheets.exe" -ArgumentList "/ErrorStdOut", "$PWD\tests\e2e_cpfs_stub.ahk"
          $p = Start-Process -FilePath $env:AHK1_EXE -ArgumentList "/ErrorStdOut", "$PWD\tests\e2e_cpfs.ahk" `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput "$env:TEMP\cpfs_out.txt" -RedirectStandardError "$env:TEMP\cpfs_err.txt"
          Get-Content "$env:TEMP\cpfs_out.txt" -ErrorAction SilentlyContinue
          Get-Content "$env:TEMP\cpfs_err.txt" -ErrorAction SilentlyContinue
          Stop-Process -Name CPFlowsheets -Force -ErrorAction SilentlyContinue
          exit $p.ExitCode

      - name: CPRS e2e (fake TfrmRemDlg via superclassed VCL classes)
        shell: pwsh
        run: |
          Start-Process "$env:TEMP\CPRSChart.exe" -ArgumentList "/ErrorStdOut", "$PWD\tests\e2e_cprs_stub.ahk"
          $p = Start-Process -FilePath $env:AHK1_EXE -ArgumentList "/ErrorStdOut", "$PWD\tests\e2e_cprs.ahk" `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput "$env:TEMP\cprs_out.txt" -RedirectStandardError "$env:TEMP\cprs_err.txt"
          Get-Content "$env:TEMP\cprs_out.txt" -ErrorAction SilentlyContinue
          Get-Content "$env:TEMP\cprs_err.txt" -ErrorAction SilentlyContinue
          Stop-Process -Name CPRSChart -Force -ErrorAction SilentlyContinue
          exit $p.ExitCode

  compile-check:
    name: Compilation Check
    runs-on: windows-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - name: Compile latest v1 script
        uses: nukdokplex/autohotkey-build@v0.1
        with:
          version: "1.1.37.02"
          x64: true
          x86: false
          compression: none
          in: .
          out: build
        continue-on-error: true

      - name: Report compilation results
        shell: pwsh
        run: |
          $exes = Get-ChildItem -Path build -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($exes) {
            Write-Host "Successfully compiled:"
            foreach ($exe in $exes) {
              Write-Host "  $($exe.Name) ($([math]::Round($exe.Length / 1KB)) KB)"
            }
          } else {
            Write-Host "::warning::No executables produced. This may be expected if .ahk.txt files need renaming."
            Write-Host "Syntax validation is the primary check — compilation is a bonus."
          }

  stamp-version:
    name: Stamp Version Info
    runs-on: ubuntu-latest
    needs: [syntax-check, unit-tests, compile-check]
    if: false  # Disabled — using branches for version tracking instead
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - name: Stamp commit hash and date into scripts
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format=%cs)
          echo "Stamping: $SHORT_SHA | $COMMIT_DATE"

          # Find the latest version file only (highest version number)
          LATEST=$(ls -1 CPRSBooster_v*.ahk.txt 2>/dev/null | sort -V | tail -1)
          CHANGED=false
          if [ -n "$LATEST" ]; then
            # Extract current version and hash from the NB_VersionLine
            VER=$(grep -oP 'v\d+\.\d+(?= \| )' "$LATEST" | head -1)
            CURRENT=$(grep -oP 'v\d+\.\d+ \| \K\S+' "$LATEST" | head -1)
            if [ -n "$VER" ] && [ "$CURRENT" != "$SHORT_SHA" ]; then
              # Use python for reliable replacement (avoid sed escaping issues)
              python3 -c "
          import re, sys
          with open('$LATEST', 'r') as f: content = f.read()
          content = re.sub(
              r'(v\d+\.\d+) \| \S+ \| \S+',
              r'\1 | ${SHORT_SHA} | ${COMMIT_DATE}',
              content, count=1)
          with open('$LATEST', 'w') as f: f.write(content)
          "
              CHANGED=true
              echo "Stamped: $LATEST ($VER: $CURRENT -> $SHORT_SHA)"
            else
              echo "Already current: $LATEST"
            fi
          fi

          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add *.ahk.txt
            git commit -m "ci: stamp version ${SHORT_SHA}"
            git push

            # Mark the stamp commit with a green check (CI won't re-trigger on bot pushes)
            STAMP_SHA=$(git rev-parse HEAD)
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/${STAMP_SHA}" \
              -d "{\"state\":\"success\",\"context\":\"AHK Syntax Check & Build\",\"description\":\"Version stamp of ${SHORT_SHA} (CI passed on parent)\"}"
            echo "Stamped and marked: ${STAMP_SHA}"
          else
            echo "Already stamped or no unstamped files, skipping"
          fi
